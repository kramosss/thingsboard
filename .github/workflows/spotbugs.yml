# ─────────────────────────────────────────────────────────────────────────────
# SpotBugs static analysis workflow
#
# Runs SpotBugs via Maven, converts results to SARIF, and uploads them to
# GitHub's Security → Code scanning tab.
# Results appear under Security → Code scanning → Tool: SpotBugs.
# ─────────────────────────────────────────────────────────────────────────────
name: Code Quality (SpotBugs)

on:
  push:
    branches:
      - master
      - 'develop/**'
      - 'hotfix/**'
      - 'ci/**'
  pull_request:
    branches:
      - master
      - 'develop/**'
      - 'ci/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spotbugs:
    name: SpotBugs Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Build + run SpotBugs across the core Java modules.
      # failOnError=false is set in pom.xml so the step won't fail even if
      # bugs are found — we collect and upload them all.
      - name: Run SpotBugs (verify phase)
        env:
          MAVEN_OPTS: '-Xmx3g -XX:+UseG1GC'
        run: |
          mvn -T 1C verify \
            -pl common/util,common/data,common/actor,dao,rule-engine/rule-engine-api,application \
            --also-make \
            -DskipTests \
            -Dlicense.skip=true \
            -Djacoco.skip=true \
            -Dspotbugs.xmlOutput=true \
            -Dpkg.disabled=true \
            -fae \
            -B -ntp

      - name: List SpotBugs XML reports
        run: find . -name 'spotbugsXml.xml' | sort

      - name: Install spotbugs-sarif converter
        run: pip install spotbugs2sarif --quiet

      - name: Merge & convert SpotBugs XML to SARIF
        run: |
          REPORT_FILES=$(find . -name 'spotbugsXml.xml' | tr '\n' ' ')

          if [ -z "$REPORT_FILES" ]; then
            echo "No SpotBugs XML reports found — creating empty SARIF"
            cat > spotbugs.sarif <<'EOF'
          {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [{"tool": {"driver": {"name": "SpotBugs", "rules": []}}, "results": []}]
          }
          EOF
          else
            python - <<'PYEOF'
          import subprocess, sys, json, os, glob

          xml_files = glob.glob('./**/spotbugsXml.xml', recursive=True)
          print(f"Converting {len(xml_files)} SpotBugs XML files to SARIF", file=sys.stderr)

          merged_results = []
          merged_rules = {}
          driver_info = None

          for xml_file in xml_files:
              out_file = xml_file.replace('.xml', '.sarif')
              subprocess.run(
                  ['spotbugs2sarif', xml_file, '-o', out_file],
                  check=False, capture_output=True
              )
              if os.path.exists(out_file):
                  with open(out_file) as f:
                      sarif = json.load(f)
                  for run in sarif.get('runs', []):
                      if driver_info is None:
                          driver_info = run['tool']['driver']
                      for rule in run['tool']['driver'].get('rules', []):
                          merged_rules[rule['id']] = rule
                      merged_results.extend(run.get('results', []))

          if driver_info is None:
              driver_info = {"name": "SpotBugs", "version": "4.9.3", "rules": []}

          driver_info['rules'] = list(merged_rules.values())

          output = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [{"tool": {"driver": driver_info}, "results": merged_results}]
          }

          with open('spotbugs.sarif', 'w') as f:
              json.dump(output, f, indent=2)

          print(f"Merged {len(merged_results)} findings into spotbugs.sarif", file=sys.stderr)
          PYEOF
          fi

      - name: Upload SpotBugs SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: spotbugs.sarif
          category: spotbugs-java

      - name: Upload SpotBugs XML reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-xml-reports
          path: '**/target/spotbugsXml.xml'
          retention-days: 14
