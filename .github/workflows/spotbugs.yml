# ─────────────────────────────────────────────────────────────────────────────
# SpotBugs static analysis workflow
#
# Runs SpotBugs via Maven, converts results to SARIF, and uploads them to
# GitHub's Security → Code scanning tab.
# Results appear under Security → Code scanning → Tool: SpotBugs.
# ─────────────────────────────────────────────────────────────────────────────
name: Code Quality (SpotBugs)

on:
  push:
    branches:
      - master
      - 'develop/**'
      - 'hotfix/**'
      - 'ci/**'
  pull_request:
    branches:
      - master
      - 'develop/**'
      - 'ci/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spotbugs:
    name: SpotBugs Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Build + run SpotBugs on the core data module and its upstream deps.
      # Uses the 'spotbugs' goal (report only) — never fails the build.
      # MAVEN_OPTS controls Maven's JVM; spotbugs.jvmArgs controls the
      # separate SpotBugs subprocess JVM.
      - name: Run SpotBugs (verify phase)
        env:
          MAVEN_OPTS: '-Xmx2g -XX:+UseG1GC'
        run: |
          mvn verify \
            -pl common/data \
            --also-make \
            -DskipTests \
            -Dlicense.skip=true \
            -Djacoco.skip=true \
            -Dspotbugs.xmlOutput=true \
            -Dpkg.disabled=true \
            -Dmaven.compiler.release=21 \
            -B -ntp

      - name: List SpotBugs XML reports
        run: find . -name 'spotbugsXml.xml' | sort

      - name: Convert SpotBugs XML to SARIF
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET
          import json, glob, sys, os

          PRIORITY_TO_LEVEL = {"1": "error", "2": "warning", "3": "note"}

          xml_files = glob.glob('./**/spotbugsXml.xml', recursive=True)
          print(f"Found {len(xml_files)} SpotBugs XML report(s)", file=sys.stderr)

          merged_results = []
          merged_rules = {}

          for xml_file in xml_files:
              try:
                  tree = ET.parse(xml_file)
                  root = tree.getroot()
              except ET.ParseError as e:
                  print(f"Skipping {xml_file}: {e}", file=sys.stderr)
                  continue

              # Collect rule metadata from BugPattern elements
              for bp in root.findall('BugPattern'):
                  bug_type = bp.get('type', '')
                  if bug_type and bug_type not in merged_rules:
                      merged_rules[bug_type] = {
                          'id': bug_type,
                          'name': bug_type,
                          'shortDescription': {'text': (bp.findtext('ShortDescription') or bug_type)},
                          'fullDescription': {'text': (bp.findtext('Details') or bp.findtext('ShortDescription') or bug_type)},
                          'helpUri': f'https://spotbugs.readthedocs.io/en/stable/bugDescriptions.html#{bug_type.lower().replace("_", "-")}',
                          'properties': {'tags': [bp.get('category', 'OTHER')]},
                      }

              # Convert each BugInstance to a SARIF result
              for bug in root.findall('BugInstance'):
                  bug_type = bug.get('type', 'UNKNOWN')
                  priority = bug.get('priority', '2')
                  level = PRIORITY_TO_LEVEL.get(priority, 'warning')
                  msg = bug.findtext('LongMessage') or bug.findtext('ShortMessage') or bug_type

                  # Prefer the primary SourceLine
                  src_line = None
                  for sl in bug.iter('SourceLine'):
                      if sl.get('primary') == 'true':
                          src_line = sl
                          break
                  if src_line is None:
                      src_line = bug.find('SourceLine')

                  locations = []
                  if src_line is not None:
                      source_path = src_line.get('sourcepath', '')
                      start = src_line.get('start')
                      # Map sourcepath (pkg/Sub/File.java) to src root-relative URI
                      uri = source_path.replace('\\', '/')
                      loc = {
                          'physicalLocation': {
                              'artifactLocation': {
                                  'uri': uri,
                                  'uriBaseId': '%SRCROOT%'
                              }
                          }
                      }
                      if start:
                          loc['physicalLocation']['region'] = {'startLine': int(start)}
                          end = src_line.get('end')
                          if end and end != start:
                              loc['physicalLocation']['region']['endLine'] = int(end)
                      locations.append(loc)

                  # Ensure rule entry exists
                  if bug_type not in merged_rules:
                      short = bug.findtext('ShortMessage') or bug_type
                      merged_rules[bug_type] = {
                          'id': bug_type,
                          'name': bug_type,
                          'shortDescription': {'text': short},
                          'fullDescription': {'text': short},
                      }

                  merged_results.append({
                      'ruleId': bug_type,
                      'level': level,
                      'message': {'text': msg},
                      'locations': locations,
                  })

          sarif = {
              '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',
              'version': '2.1.0',
              'runs': [{
                  'tool': {
                      'driver': {
                          'name': 'SpotBugs',
                          'version': '4.9.3',
                          'informationUri': 'https://spotbugs.github.io/',
                          'rules': list(merged_rules.values()),
                      }
                  },
                  'results': merged_results,
              }]
          }

          with open('spotbugs.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)

          print(f"Wrote {len(merged_results)} finding(s) to spotbugs.sarif", file=sys.stderr)
          PYEOF

      - name: Upload SpotBugs SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: spotbugs.sarif
          category: spotbugs-java

      - name: Upload SpotBugs XML reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-xml-reports
          path: '**/target/spotbugsXml.xml'
          retention-days: 14
