name: Build and Test

on:
  push:
    branches:
      - master
      - 'develop/**'
      - 'hotfix/**'
      - 'ci/**'
  pull_request:
    branches:
      - master
      - 'develop/**'
      - 'ci/**'

# Cancel any in-progress run for the same branch/PR so we don't waste minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 – Compile common/util and all its upstream dependencies.
  #         Avoids ui-ngx (frontend-maven-plugin downloads Node/Yarn)
  #         and msa/black-box-tests (only in reactor when
  #         -DblackBoxTests.skip=false, so excluding it with ! errors).
  #         --also-make resolves only what common/util needs.
  # ─────────────────────────────────────────────────────────────
  compile:
    name: Compile common/util
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Print tool versions
        run: |
          java -version
          mvn -version

      - name: Compile common/util and dependencies
        env:
          MAVEN_OPTS: '-Xmx2g -XX:+UseG1GC'
        run: |
          mvn -T 1C install \
            -pl common/util \
            --also-make \
            -DskipTests \
            -Dpkg.disabled=true \
            -fae \
            -B -ntp

  # ─────────────────────────────────────────────────────────────
  # Job 2 – Run unit tests for common/util
  #         This module has no external service dependencies and
  #         contains representative tests (e.g. RegexUtilsTest).
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (common/util)
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Print tool versions
        run: |
          java -version
          mvn -version

      # --also-make compiles upstream deps then runs tests in common/util only.
      - name: Run common/util tests
        env:
          MAVEN_OPTS: '-Xmx1g'
        run: |
          mvn test \
            -pl common/util \
            --also-make \
            -Dpkg.disabled=true \
            -fae \
            -B -ntp

      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-common-util
          path: 'common/util/target/surefire-reports/*.xml'
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 3 – Angular UI build & lint
  #         Pre-existing lint warnings in the ThingsBoard source
  #         are non-blocking (continue-on-error on the lint step).
  # ─────────────────────────────────────────────────────────────
  ui-build:
    name: Angular UI Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui-ngx

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node 22 matches @types/node ~22.x in ui-ngx/package.json.
      # The project uses Yarn (yarn.lock present), not npm.
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: ui-ngx/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Lint is informational – ThingsBoard source has pre-existing warnings.
      - name: Lint (non-blocking)
        run: yarn lint
        continue-on-error: true

      - name: Production build
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: yarn build:prod

  # ─────────────────────────────────────────────────────────────
  # Job 4 – DAO integration tests (requires PostgreSQL)
  #         Runs only on push events to keep PR feedback fast.
  # ─────────────────────────────────────────────────────────────
  integration-tests:
    name: DAO Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: compile
    if: github.event_name == 'push'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: thingsboard
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Print tool versions
        run: |
          java -version
          mvn -version

      - name: Run DAO integration tests
        env:
          MAVEN_OPTS: '-Xmx2g -XX:+UseG1GC'
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/thingsboard
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: |
          mvn -T 1 test \
            -pl dao \
            --also-make \
            -Dpkg.disabled=true \
            -fae \
            -B -ntp

      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-dao
          path: 'dao/target/surefire-reports/*.xml'
          retention-days: 7
