name: Build and Test

on:
  push:
    branches:
      - master
      - 'develop/**'
      - 'hotfix/**'
      - 'ci/**'
  pull_request:
    branches:
      - master
      - 'develop/**'
      - 'ci/**'

# Cancel any in-progress run for the same branch/PR so we don't waste minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 – Java unit tests (all modules, no external services)
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Java Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # JDK 25 with Amazon Corretto – matches maven.compiler.source in pom.xml
      - name: Set up JDK 25 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '25'
          cache: maven  # caches ~/.m2/repository between runs

      # --projects excludes the Angular UI module (built separately) and the
      # black-box tests (they need Docker + a running TB instance).
      # -DblackBoxTests.skip=true is redundant but explicit.
      - name: Build and run unit tests
        env:
          MAVEN_OPTS: '-Xmx2g -XX:+UseG1GC'
        run: |
          mvn -T 1C clean verify \
            --projects '!ui-ngx,!msa/black-box-tests' \
            --also-make \
            -DblackBoxTests.skip=true \
            -Dpkg.disabled=true \
            -B -ntp

      # Upload Surefire XML reports so GitHub shows per-test results
      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 2 – Angular UI build & lint
  # ─────────────────────────────────────────────────────────────
  ui-build:
    name: Angular UI Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui-ngx

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node 22 matches @types/node ~22.x declared in ui-ngx/package.json
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui-ngx/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: npm run build:prod

  # ─────────────────────────────────────────────────────────────
  # Job 3 – Integration / DAO tests (requires PostgreSQL)
  # Runs only on push to master or develop/** (not on every PR draft)
  # ─────────────────────────────────────────────────────────────
  integration-tests:
    name: DAO Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    # Only run on push events to keep PR feedback fast; remove the 'if' to
    # enable on pull_request as well.
    if: github.event_name == 'push'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: thingsboard
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '25'
          cache: maven

      # Run only the dao module's tests against the live Postgres container.
      # Tests that need Cassandra are excluded via the tag filter so they don't
      # block this job – add a separate Cassandra job if needed.
      - name: Run DAO integration tests
        env:
          MAVEN_OPTS: '-Xmx2g -XX:+UseG1GC'
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/thingsboard
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: |
          mvn -T 1 verify \
            --projects dao \
            --also-make \
            -DblackBoxTests.skip=true \
            -Dpkg.disabled=true \
            -B -ntp

      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-integration
          path: 'dao/**/target/surefire-reports/*.xml'
          retention-days: 7
