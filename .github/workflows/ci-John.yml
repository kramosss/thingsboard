name: CI - John

on:
  push:
    branches:
      - master
      - 'ci/**'
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Compile Full Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '25'
          cache: maven

      - name: Compile all backend modules (skip frontend)
        run: mvn install -DskipTests -pl "!ui-ngx" -Dlicense.skip=true -Djacoco.skip=true --batch-mode

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '25'
          cache: maven

      - name: Build dependencies
        run: mvn install -DskipTests -pl "!ui-ngx" -Dlicense.skip=true -Djacoco.skip=true --batch-mode

      - name: Run tests on common/util and common/data
        run: mvn test -pl "common/util,common/data" --also-make -Dlicense.skip=true -Djacoco.skip=true --batch-mode